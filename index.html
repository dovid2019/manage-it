<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Management Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [properties, setProperties] = useState([
                { id: 1, name: "Oakwood Apartments, Apt 4B", landlordEmail: "landlord1@example.com", tasks: [] },
                { id: 2, name: "Maple Street House, No. 12", landlordEmail: "landlord2@example.com", tasks: [] }
            ]);
            const [selectedProperty, setSelectedProperty] = useState(null);
            
            // Form States
            const [currentLocation, setCurrentLocation] = useState('');
            const [assignedEmployee, setAssignedEmployee] = useState('');
            const [scheduledDateTime, setScheduledDateTime] = useState('');

            // Add Key Collection Task
            const handleAddTask = (e) => {
                e.preventDefault();
                if (!selectedProperty) return;

                const newTask = {
                    id: Date.now(),
                    type: 'Key Collection',
                    currentLocation,
                    assignedEmployee,
                    scheduledDateTime,
                    status: 'Pending'
                };

                const updatedProperties = properties.map(p => {
                    if (p.id === selectedProperty.id) {
                        const updatedProperty = { ...p, tasks: [...p.tasks, newTask] };
                        setSelectedProperty(updatedProperty);
                        return updatedProperty;
                    }
                    return p;
                });

                setProperties(updatedProperties);
                setCurrentLocation('');
                setAssignedEmployee('');
                setScheduledDateTime('');
            };

            // Complete Task
            const handleCollectKey = (propertyId, taskId) => {
                const updatedProperties = properties.map(p => {
                    if (p.id === propertyId) {
                        const updatedTasks = p.tasks.map(t => t.id === taskId ? { ...t, status: 'Collected' } : t);
                        const updatedProperty = { ...p, tasks: updatedTasks };
                        setSelectedProperty(updatedProperty);
                        return updatedProperty;
                    }
                    return p;
                });

                setProperties(updatedProperties);
                alert(`⚡ Status updated to Collected! Simulation: Email sent to the landlord.`);
            };

            return (
                <div class="max-w-6xl mx-auto p-6">
                    <header class="mb-6 pb-4 border-b border-gray-300">
                        <h1 class="text-3xl font-bold text-gray-800">🏢 Property Management Task Center</h1>
                    </header>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {/* Left Side: Property List */}
                        <div class="bg-white p-4 rounded-lg shadow">
                            <h2 class="text-xl font-semibold mb-4 text-gray-700">Property Portfolio</h2>
                            <div class="space-y-3">
                                {properties.map(property => (
                                    <div 
                                        key={property.id} 
                                        onClick={() => setSelectedProperty(property)}
                                        class={`p-4 border rounded-lg cursor-pointer transition-colors ${selectedProperty?.id === property.id ? 'bg-blue-50 border-blue-400' : 'bg-white hover:bg-gray-50'}`}
                                    >
                                        <h3 class="font-bold text-gray-800">{property.name}</h3>
                                        <p class="text-sm text-gray-500">📩 {property.landlordEmail}</p>
                                        <span class="inline-block mt-2 text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded-full">
                                            {property.tasks.length} Active Tasks
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Right Side: Task Workspace */}
                        <div class="md:col-span-2 bg-white p-6 rounded-lg shadow">
                            {selectedProperty ? (
                                <div>
                                    <h2 class="text-2xl font-bold text-gray-800 mb-4">Unit: {selectedProperty.name}</h2>
                                    
                                    {/* Existing Tasks */}
                                    <h3 class="text-lg font-semibold text-gray-700 mb-2">📋 Current Tasks</h3>
                                    {selectedProperty.tasks.length === 0 ? (
                                        <p class="text-gray-500 mb-6 italic">No tasks assigned yet.</p>
                                    ) : (
                                        <div class="space-y-3 mb-6">
                                            {selectedProperty.tasks.map(task => (
                                                <div key={task.id} class="p-4 border-l-4 border-blue-500 bg-gray-50 rounded shadow-sm">
                                                    <div class="flex justify-between items-start">
                                                        <div>
                                                            <strong class="text-blue-700 text-lg">🔑 {task.type}</strong>
                                                            <p class="text-sm text-gray-600 mt-1">📍 <strong>Location:</strong> {task.currentLocation}</p>
                                                            <p class="text-sm text-gray-600">👤 <strong>Staff:</strong> {task.assignedEmployee}</p>
                                                            <p class="text-sm text-gray-600">📅 <strong>Scheduled:</strong> {task.scheduledDateTime}</p>
                                                        </div>
                                                        <span class={`px-2 py-1 text-xs font-bold rounded ${task.status === 'Collected' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}`}>
                                                            {task.status}
                                                        </span>
                                                    </div>
                                                    {task.status !== 'Collected' && (
                                                        <button 
                                                            onClick={() => handleCollectKey(selectedProperty.id, task.id)}
                                                            class="mt-3 bg-green-600 hover:bg-green-700 text-white text-sm font-medium py-1.5 px-3 rounded transition-colors"
                                                        >
                                                            ✅ Confirm Collection & Notify Landlord
                                                        </button>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {/* Create Task Form */}
                                    <div class="border-t pt-4">
                                        <h3 class="text-lg font-semibold text-gray-700 mb-3">Assign Key Collection Task</h3>
                                        <form onSubmit={handleAddTask} class="space-y-3">
                                            <div>
                                                <label class="block text-sm font-medium text-gray-600 mb-1">Where is the key right now?</label>
                                                <input type="text" value={currentLocation} onChange={e => setCurrentLocation(e.target.value)} required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-400 outline-none" placeholder="e.g. Front desk, Safe box" />
                                            </div>
                                            <div>
                                                <label class="block text-sm font-medium text-gray-600 mb-1">Assigned Employee</label>
                                                <input type="text" value={assignedEmployee} onChange={e => setAssignedEmployee(e.target.value)} required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-400 outline-none" placeholder="Employee Name" />
                                            </div>
                                            <div>
                                                <label class="block text-sm font-medium text-gray-600 mb-1">Date & Time to Fetch</label>
                                                <input type="datetime-local" value={scheduledDateTime} onChange={e => setScheduledDateTime(e.target.value)} required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-400 outline-none" />
                                            </div>
                                            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition-colors">
                                                ➕ Add Task
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            ) : (
                                <div class="text-center text-gray-400 py-12 italic">
                                    ⬅️ Select a property portfolio from the left pane to manage tasks.
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
