<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Management Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div class="max-w-6xl mx-auto p-6">
        <header class="mb-6 pb-4 border-b border-gray-300">
            <h1 class="text-3xl font-bold text-gray-800">🏢 Property Management Task Center</h1>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-4 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Property Portfolio</h2>
                <div class="space-y-3" id="property-list">
                    </div>
            </div>

            <div class="md:col-span-2 bg-white p-6 rounded-lg shadow" id="workspace">
                <div class="text-center text-gray-400 py-12 italic">
                    ⬅️ Select a property portfolio from the left pane to manage tasks.
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data Store
        let properties = [
            { id: 1, name: "Oakwood Apartments, Apt 4B", landlordEmail: "landlord1@example.com", tasks: [] },
            { id: 2, name: "Maple Street House, No. 12", landlordEmail: "landlord2@example.com", tasks: [] }
        ];
        let selectedPropertyId = null;

        // Render the property list on the left side
        function renderProperties() {
            const listContainer = document.getElementById('property-list');
            listContainer.innerHTML = '';

            properties.forEach(property => {
                const isSelected = property.id === selectedPropertyId;
                const card = document.createElement('div');
                card.className = `p-4 border rounded-lg cursor-pointer transition-colors ${isSelected ? 'bg-blue-50 border-blue-400' : 'bg-white hover:bg-gray-50'}`;
                card.onclick = () => selectProperty(property.id);
                
                card.innerHTML = `
                    <h3 class="font-bold text-gray-800">${property.name}</h3>
                    <p class="text-sm text-gray-500">📩 ${property.landlordEmail}</p>
                    <span class="inline-block mt-2 text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded-full">
                        ${property.tasks.length} Active Tasks
                    </span>
                `;
                listContainer.appendChild(card);
            });
        }

        // Change active property
        function selectProperty(id) {
            selectedPropertyId = id;
            renderProperties();
            renderWorkspace();
        }

        // Render workspace on the right side
        function renderWorkspace() {
            const workspace = document.getElementById('workspace');
            const property = properties.find(p => p.id === selectedPropertyId);

            if (!property) return;

            // Generate task list layout
            let tasksHtml = '<p class="text-gray-500 mb-6 italic">No tasks assigned yet.</p>';
            if (property.tasks.length > 0) {
                tasksHtml = '<div class="space-y-3 mb-6">';
                property.tasks.forEach(task => {
                    tasksHtml += `
                        <div class="p-4 border-l-4 border-blue-500 bg-gray-50 rounded shadow-sm">
                            <div class="flex justify-between items-start">
                                <div>
                                    <strong class="text-blue-700 text-lg">🔑 ${task.type}</strong>
                                    <p class="text-sm text-gray-600 mt-1">📍 <strong>Location:</strong> ${task.currentLocation}</p>
                                    <p class="text-sm text-gray-600">👤 <strong>Staff:</strong> ${task.assignedEmployee}</p>
                                    <p class="text-sm text-gray-600">📅 <strong>Scheduled:</strong> ${task.scheduledDateTime}</p>
                                </div>
                                <span class="px-2 py-1 text-xs font-bold rounded ${task.status === 'Collected' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}">
                                    ${task.status}
                                </span>
                            </div>
                            ${task.status !== 'Collected' ? `
                                <button onclick="collectKey(${property.id}, ${task.id})" class="mt-3 bg-green-600 hover:bg-green-700 text-white text-sm font-medium py-1.5 px-3 rounded transition-colors">
                                    ✅ Confirm Collection & Notify Landlord
                                </button>
                            ` : ''}
                        </div>
                    `;
                });
                tasksHtml += '</div>';
            }

            // Put workspace layout together
            workspace.innerHTML = `
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-4">Unit: ${property.name}</h2>
                    <h3 class="text-lg font-semibold text-gray-700 mb-2">📋 Current Tasks</h3>
                    ${tasksHtml}

                    <div class="border-t pt-4">
                        <h3 class="text-lg font-semibold text-gray-700 mb-3">Assign Key Collection Task</h3>
                        <form onsubmit="addTask(event, ${property.id})" class="space-y-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Where is the key right now?</label>
                                <input type="text" id="form-location" required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-400 outline-none" placeholder="e.g. Front desk, Safe box" />
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Assigned Employee</label>
                                <input type="text" id="form-employee" required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-400 outline-none" placeholder="Employee Name" />
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">Date & Time to Fetch</label>
                                <input type="datetime-local" id="form-date" required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-400 outline-none" />
                            </div>
                            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition-colors">
                                ➕ Add Task
                            </button>
                        </form>
                    </div>
                </div>
            `;
        }

        // Form submission action
        window.addTask = function(e, propertyId) {
            e.preventDefault();
            const property = properties.find(p => p.id === propertyId);
            
            const newTask = {
                id: Date.now(),
                type: 'Key Collection',
                currentLocation: document.getElementById('form-location').value,
                assignedEmployee: document.getElementById('form-employee').value,
                scheduledDateTime: document.getElementById('form-date').value,
                status: 'Pending'
            };

            property.tasks.push(newTask);
            renderProperties();
            renderWorkspace();
        };

        // Complete collection action
        window.collectKey = function(propertyId, taskId) {
            const property = properties.find(p => p.id === propertyId);
            const task = property.tasks.find(t => t.id === taskId);
            
            task.status = 'Collected';
            renderWorkspace();
            alert(`⚡ Status updated to Collected! Simulation: Email notification sent to landlord.`);
        };

        // Initialize display
        renderProperties();
    </script>
</body>
</html>
